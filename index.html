<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Seam Inspection Log | REC 7.2.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #003366; --secondary-color: #3399ff; --bg-light: #f4f7fa; --danger-color: #c62828; --border-color: #d1d9e6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .search-engine { background: var(--primary-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; color: white; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .search-input-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
        .search-input-group label { font-size: 10px; text-transform: uppercase; margin-bottom: 4px; color: #b0c4de; }
        .search-input { padding: 8px; border: none; border-radius: 4px; font-size: 13px; color: #333; }
        .btn-search { background: var(--secondary-color); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; font-weight: bold; border: 2px solid var(--secondary-color); border-radius: 8px; cursor: pointer; background: white; font-size: 13px; }
        .mode-btn.active { background: var(--primary-color); color: white; }

        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; background: #eef4f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: bold; color: var(--primary-color); margin-bottom: 4px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: white; width: 100%; box-sizing: border-box; }

        .out-of-spec { color: var(--danger-color) !important; font-weight: bold; border: 2px solid var(--danger-color) !important; background-color: #fff0f0 !important; }
        .calc-row { background: #f0f7ff; font-weight: bold; }

        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1200px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: var(--primary-color); color: white; text-transform: uppercase; }
        input.table-input { width: 95%; border: 1px solid #eee; border-radius: 4px; background: white; text-align: center; font-size: 14px; padding: 4px 0; }

        .quick-calculator { max-width: 500px; margin: 0 auto; display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- TRIPLE SEARCH ENGINE -->
    <div class="search-engine" id="searchPanel">
        <div class="search-input-group"><label>Search AG Code</label><input type="text" id="s_ag" class="search-input"></div>
        <div class="search-input-group"><label>Search Job Number</label><input type="text" id="s_job" class="search-input"></div>
        <div class="search-input-group"><label>Search Pallet Code (Cans)</label><input type="text" id="s_pal" class="search-input"></div>
        <button class="btn-search" onclick="searchRecords()">FIND RUN</button>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" id="btnReport" onclick="setMode('Report')">REC 7.2.12 Completion</button>
        <button class="mode-btn" id="btnQuick" onclick="setMode('Quick')">Quick Test</button>
    </div>

    <!-- METADATA GRID -->
    <div id="metaSection" class="meta-grid">
        <div class="form-group"><label>DATE *</label><input type="date" id="report_date"></div>
        <div class="form-group"><label>AG CODE *</label><input type="text" id="ag_code"></div>
        <div class="form-group"><label>JOB NUMBER *</label><input type="text" id="job_no"></div>
        <div class="form-group"><label>Pallet Code (Cans) *</label><input type="text" id="pallet_cans"></div>
        <div class="form-group">
            <label>Can Size</label>
            <select id="can_size" onchange="toggleOtherSize()">
                <option value="73x111mm">73x111mm</option>
                <option value="73x119mm">73x119mm</option>
                <option value="99x119mm">99x119mm</option>
                <option value="Other">Other (Manual Input)</option>
            </select>
            <input type="text" id="other_size" style="display:none; margin-top:5px;" placeholder="Enter custom size...">
        </div>
        <div class="form-group"><label>Stage</label><select id="stage" onchange="renderView()"><option value="Start-up">Start-up</option><option value="During production">During production</option><option value="After production">After production</option></select></div>
        <div class="form-group"><label>Plate Te (Ends)</label><input type="number" id="te" step="0.001" oninput="runAI()"></div>
        <div class="form-group"><label>Plate Tb (Body)</label><input type="number" id="tb" step="0.001" oninput="runAI()"></div>
    </div>

    <!-- QUICK TEST CALCULATOR -->
    <div id="quickCalculator" class="quick-calculator">
        <div class="form-group"><label>Plate Te (Ends)</label><input type="number" id="te_q" step="0.001" oninput="runAI()"></div>
        <div class="form-group"><label>Plate Tb (Body)</label><input type="number" id="tb_q" step="0.001" oninput="runAI()"></div>
        <div id="quickFields"></div>
    </div>

    <!-- MAIN INSPECTION TABLE -->
    <div id="matrixContainer" class="table-container">
        <table id="inspectionTable">
            <thead>
                <tr id="canHeaderRow"></tr>
                <tr id="pointHeaderRow"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="footerActions" style="margin-top:20px;">
        <div id="inspectorGroup" style="margin-bottom:20px;">
            <label style="font-size: 11px; font-weight: bold; color: var(--primary-color);">Inspector Signature *</label>
            <input type="text" id="inspector" style="width:100%;" placeholder="Sign off here...">
        </div>
        <button class="btn-submit" style="background:#2e7d32; color:white; padding:15px; border:none; border-radius:6px; width:100%; font-weight:bold; cursor:pointer;" onclick="submitRecords()">SYNC DATA TO CLOUD</button>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://kbpyivgmgipskwiutbtk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImticHlpdmdtZ2lwc2t3aXV0YnRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQ3ODYsImV4cCI6MjA5NDk0MDc4Nn0.kGcr57Mdnd9jFepz9ndDFuEUEwD8qRVqIkCNhmgCKPY');
    let currentMode = 'Report';
    
    // RESTORED LABELS: Seam Length and Seam Thickness
    const fields = [
        { id: 'bh', label: 'Body Hook (1.80-2.15)', isCalc: false, min: 1.80, max: 2.15 },
        { id: 'ch', label: 'Cover Hook (1.70-2.10)', isCalc: false, min: 1.70, max: 2.10 },
        { id: 'sl', label: 'Seam Length (2.65-3.05)', isCalc: false, min: 2.65, max: 3.05 },
        { id: 'st', label: 'Seam Thickness', isCalc: false },
        { id: 'tightness', label: 'Tightness Rating (70-100%)', isCalc: false, min: 70, max: 100 },
        { id: 'ov_mm', label: 'Actual Overlap (1mm Min)', isCalc: true, min: 1.0 },
        { id: 'ovp', label: 'Overlap % (Min 45%)', isCalc: true, min: 45 },
        { id: 'bhb', label: 'B.H.B. % (70-90%)', isCalc: true, min: 70, max: 90 },
        { id: 'fs', label: 'Free Space (0.03-0.19)', isCalc: true, min: 0.03, max: 0.19 }
    ];

    function toggleOtherSize() {
        const val = document.getElementById('can_size').value;
        document.getElementById('other_size').style.display = (val === 'Other') ? 'block' : 'none';
    }

    function setMode(m) {
        currentMode = m;
        const isQuick = m === 'Quick';
        document.getElementById('searchPanel').style.display = isQuick ? 'none' : 'flex';
        document.getElementById('metaSection').style.display = isQuick ? 'none' : 'grid';
        document.getElementById('matrixContainer').style.display = isQuick ? 'none' : 'block';
        document.getElementById('footerActions').style.display = isQuick ? 'none' : 'block';
        document.getElementById('quickCalculator').style.display = isQuick ? 'block' : 'none';
        document.getElementById('btnReport').classList.toggle('active', !isQuick);
        document.getElementById('btnQuick').classList.toggle('active', isQuick);
        renderView();
    }

    function renderView() {
        if (currentMode === 'Report') {
            const body = document.getElementById('tableBody');
            document.getElementById('canHeaderRow').innerHTML = `<th>Parameter</th>${'<th>CAN 1</th><th>CAN 1</th><th>CAN 1</th><th>CAN 2</th><th>CAN 2</th><th>CAN 2</th>'}`;
            document.getElementById('pointHeaderRow').innerHTML = `<th>Spec</th>${'<th>Pt 1</th><th>Pt 2</th><th>Pt 3</th><th>Pt 1</th><th>Pt 2</th><th>Pt 3</th>'}`;
            body.innerHTML = '';
            fields.forEach(f => {
                let row = `<tr class="${f.isCalc ? 'calc-row' : ''}"><td>${f.label}</td>`;
                for(let c=1; c<=2; c++) {
                    for(let p=1; p<=3; p++) {
                        row += `<td><input type="number" step="0.001" class="table-input" id="${f.id}_c${c}_p${p}" ${f.isCalc ? 'readonly' : 'oninput="runAI()"'}></td>`;
                    }
                }
                body.innerHTML += row + '</tr>';
            });
        } else {
            const container = document.getElementById('quickFields');
            container.innerHTML = '';
            fields.forEach(f => {
                container.innerHTML += `<div class="form-group"><label>${f.label}</label><input type="number" step="0.001" id="${f.id}_q" ${f.isCalc ? 'readonly class="calc-row"' : 'oninput="runAI()"'}></div>`;
            });
        }
    }

    function runAI() {
        const te = parseFloat(document.getElementById(currentMode === 'Quick' ? 'te_q' : 'te').value) || 0;
        const tb = parseFloat(document.getElementById(currentMode === 'Quick' ? 'tb_q' : 'tb').value) || 0;
        const stage = currentMode === 'Quick' ? 'Start-up' : document.getElementById('stage').value;

        if (currentMode === 'Quick') {
            const bh = parseFloat(document.getElementById('bh_q').value) || 0;
            const ch = parseFloat(document.getElementById('ch_q').value) || 0;
            const sl = parseFloat(document.getElementById('sl_q').value) || 0;
            const st = parseFloat(document.getElementById('st_q').value) || 0;
            if(bh && ch && sl && te && tb) {
                const ov_mm = (bh + ch + te) - sl;
                const ovp = (ov_mm / (sl - (2*te + tb))) * 100;
                const bhb = ((bh - (1.1 * tb)) / (sl - (1.1 * (2 * te + tb)))) * 100;
                updateField('ov_mm_q', ov_mm.toFixed(2), ov_mm >= 1.0);
                updateField('ovp_q', Math.round(ovp), ovp >= 45);
                updateField('bhb_q', Math.round(bhb), bhb >= 70 && bhb <= 90);
                if(st) updateField('fs_q', (st - (2 * tb + 3 * te)).toFixed(2), (st - (2 * tb + 3 * te)) >= 0.03);
            }
        } else {
            for(let c=1; c<=2; c++) {
                for(let p=1; p<=3; p++) {
                    const bh = parseFloat(document.getElementById(`bh_c${c}_p${p}`).value) || 0;
                    const ch = parseFloat(document.getElementById(`ch_c${c}_p${p}`).value) || 0;
                    const sl = parseFloat(document.getElementById(`sl_c${c}_p${p}`).value) || 0;
                    const st = parseFloat(document.getElementById(`st_c${c}_p${p}`).value) || 0;
                    if(bh && ch && sl && te && tb) {
                        const ov_mm = (bh + ch + te) - sl;
                        updateField(`ov_mm_c${c}_p${p}`, ov_mm.toFixed(2), ov_mm >= 1.0);
                        updateField(`ovp_c${c}_p${p}`, Math.round((ov_mm / (sl - (2*te + tb))) * 100), ((ov_mm / (sl - (2*te + tb))) * 100) >= 45);
                        const bhb = ((bh - (1.1 * tb)) / (sl - (1.1 * (2 * te + tb)))) * 100;
                        updateField(`bhb_c${c}_p${p}`, Math.round(bhb), (stage === 'After production') ? bhb >= 70 : (bhb >= 70 && bhb <= 90));
                        if(st) updateField(`fs_c${c}_p${p}`, (st - (2 * tb + 3 * te)).toFixed(2), (st - (2 * tb + 3 * te)) >= 0.03);
                    }
                }
            }
        }
    }

    function updateField(id, val, isPass) {
        const el = document.getElementById(id);
        if(!el) return;
        el.value = val;
        el.classList.toggle('out-of-spec', !isPass);
    }

    async function searchRecords() { alert("Searching for existing AG Code and Job records..."); }
    async function submitRecords() { alert("Syncing full measurement matrix to cloud..."); }

    window.onload = () => renderView();
</script>
</body>
</html>
