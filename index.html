<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Seam Inspection Log | REC 7.2.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary-color: #003366; --secondary-color: #3399ff; --bg-light: #f4f7fa; --success-color: #2e7d32; --danger-color: #c62828; --border-color: #d1d9e6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Search & Mode Headers */
        .search-engine { background: var(--primary-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; color: white; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .search-input-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
        .search-input-group label { font-size: 10px; text-transform: uppercase; margin-bottom: 4px; color: #b0c4de; }
        .search-input { padding: 8px; border: none; border-radius: 4px; font-size: 13px; color: #333; }
        .btn-search { background: var(--secondary-color); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; font-weight: bold; border: 2px solid var(--secondary-color); border-radius: 8px; cursor: pointer; background: white; font-size: 13px; }
        .mode-btn.active { background: var(--primary-color); color: white; }

        /* Metadata & Matrix Table */
        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; background: #eef4f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: var(--primary-color); margin-bottom: 4px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }

        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1100px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: var(--primary-color); color: white; text-transform: uppercase; }
        .calc-row { background: #f0f7ff; font-weight: bold; }
        input.table-input { width: 95%; border: none; background: transparent; text-align: center; font-size: 14px; }

        /* Action Footer: Sync & Download */
        .footer-actions { margin-top: 30px; display: flex; gap: 15px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .btn-submit { flex: 2; background: var(--success-color); color: white; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-pdf { flex: 1; background: var(--primary-color); color: white; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-pdf:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-engine" id="searchPanel">
        <div class="search-input-group"><label>AG Code Search</label><input type="text" id="search_ag" class="search-input"></div>
        <div class="search-input-group"><label>Pallet (Cans) Search</label><input type="text" id="search_pallet" class="search-input"></div>
        <button class="btn-search" onclick="searchRecords()">FIND RUN</button>
    </div>

    <div class="mode-selector">
        <button id="modeReport" class="mode-btn active" onclick="setMode('Report')">REC 7.2.12 Completion (Tablet)</button>
        <button id="modeQuick" class="mode-btn" onclick="setMode('Quick')">Quick Test (Phone)</button>
    </div>

    <div id="metaSection" class="meta-grid">
        <div class="form-group"><label>AG CODE</label><input type="text" id="ag_code" readonly></div>
        <div class="form-group"><label>Pallet (Cans)</label><input type="text" id="pallet_cans" readonly></div>
        <div class="form-group"><label>Stage</label><select id="stage" onchange="checkCompletion()"><option value="Start-up">Start-up</option><option value="During production">During production</option><option value="After production">After production</option></select></div>
        <div class="form-group"><label>Micrometer Serial</label><input type="text" id="micro_serial"></div>
        <div class="form-group"><label>Te (Ends)</label><input type="number" id="te" step="0.01" value="0.21"></div>
        <div class="form-group"><label>Tb (Body)</label><input type="number" id="tb" step="0.01" value="0.21"></div>
    </div>

    <div class="table-container">
        <table id="inspectionTable">
            <thead>
                <tr id="canHeaderRow"></tr>
                <tr id="pointHeaderRow"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer-actions">
        <button id="submitBtn" class="btn-submit" onclick="submitRecords()">1. SYNC MEASUREMENTS TO DATABASE</button>
        <button id="pdfBtn" class="btn-pdf" disabled onclick="generatePDF()">2. DOWNLOAD COMPLETE PDF</button>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://kbpyivgmgipskwiutbtk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImticHlpdmdtZ2lwc2t3aXV0YnRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQ3ODYsImV4cCI6MjA5NDk0MDc4Nn0.kGcr57Mdnd9jFepz9ndDFuEUEwD8qRVqIkCNhmgCKPY');
    
    // Logic to verify completion across all 3 stages for PDF unlock [1]
    async function checkCompletion() {
        const ag = document.getElementById('ag_code').value;
        const pallet = document.getElementById('pallet_cans').value;
        if(!ag) return;

        const { data } = await sb.from('double_seam_inspection_log')
            .select('inspection_stage')
            .eq('ag_code', ag)
            .eq('pallet_cans', pallet);

        const stages = data.map(d => d.inspection_stage);
        const isComplete = stages.includes('Start-up') && stages.includes('During production') && stages.includes('After production');
        
        document.getElementById('pdfBtn').disabled = !isComplete;
        if(isComplete) document.getElementById('pdfBtn').innerText = "✅ DOWNLOAD COMPLETE PDF";
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4'); // Landscape for the matrix layout [1]
        const ag = document.getElementById('ag_code').value;

        // Title and Header
        doc.setFontSize(16);
        doc.text(`REC 7.2.12 DOUBLE SEAM INSPECTION REPORT`, 14, 15);
        doc.setFontSize(10);
        doc.text(`AG CODE: ${ag} | DATE: ${new Date().toLocaleDateString()}`, 14, 22);

        // Fetch all data for this run to build the final document
        const { data } = await sb.from('double_seam_inspection_log').select('*').eq('ag_code', ag);

        // This would use doc.autoTable to recreate the Word document's grid format [3, 4]
        doc.autoTable({
            startY: 30,
            head: [['Stage', 'Can', 'Pt', 'Vacuum', 'Length', 'Thickness', 'Body Hook', 'Cover Hook', 'Overlap %']],
            body: data.map(r => [r.inspection_stage, r.can_number, r.point_number, r.vacuum_kpa, r.seam_length, r.seam_thickness, r.body_hook, r.cover_hook, r.overlap_percent]),
            theme: 'grid'
        });

        doc.save(`REC_7.2.12_${ag}_Compliance.pdf`);
    }

    // Existing functions...
    async function submitRecords() {
        // ... (existing sync logic)
        alert("Synced! Checking completion for PDF unlock...");
        await checkCompletion();
    }
</script>
</body>
</html>
