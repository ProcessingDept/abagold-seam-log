<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Seam Inspection Log | REC 7.2.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #003366; --secondary-color: #3399ff; --bg-light: #f4f7fa; --success-color: #2e7d32; --danger-color: #c62828; --border-color: #d1d9e6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Search Engine Header Styling */
        .search-engine { background: var(--primary-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; color: white; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .search-input-group { display: flex; flex-direction: column; flex: 1; min-width: 150px; }
        .search-input-group label { font-size: 10px; text-transform: uppercase; margin-bottom: 4px; color: #b0c4de; }
        .search-input { padding: 8px; border: none; border-radius: 4px; font-size: 13px; }
        .btn-search { background: var(--secondary-color); color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        .results-dropdown { width: 100%; background: white; color: #333; border-radius: 4px; margin-top: 5px; max-height: 150px; overflow-y: auto; display: none; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .result-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 12px; }
        .result-item:hover { background: #f0f7ff; }

        h1 { color: var(--primary-color); border-bottom: 3px solid var(--secondary-color); padding-bottom: 10px; font-size: 18px; text-transform: uppercase; }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; font-weight: bold; border: 2px solid var(--secondary-color); border-radius: 8px; cursor: pointer; background: white; transition: 0.3s; }
        .mode-btn.active { background: var(--primary-color); color: white; }

        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; background: #eef4f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: var(--primary-color); margin-bottom: 4px; text-transform: uppercase; }
        .spec-tag { color: var(--secondary-color); font-weight: normal; font-size: 10px; }
        
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        input[readonly] { background-color: #eaeff5; font-weight: bold; }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1100px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: var(--primary-color); color: white; text-transform: uppercase; }
        .can-header { background: #eaeaea; color: #333; font-weight: bold; }
        .calc-row { background: #f8f9fa; font-weight: bold; color: var(--primary-color); }
        input.table-input { width: 90%; border: none; background: transparent; text-align: center; font-size: 13px; }

        .ai-panel { background: #fff3e0; border: 1px solid #ffe0b2; border-radius: 8px; padding: 15px; margin: 20px 0; display: none; }
        .ai-panel h3 { margin: 0 0 10px 0; color: #e65100; font-size: 14px; }

        .banner { padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 15px; display: none; }
        .approved { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .pending { background: #fff3cd; color: #856404; display: block; }
        .btn-submit { background: var(--success-color); color: white; padding: 15px; border: none; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- SEARCH ENGINE ENGINE -->
    <div class="search-engine">
        <div class="search-input-group">
            <label>Search AG Code</label>
            <input type="text" id="search_ag" class="search-input" placeholder="e.g. AG401">
        </div>
        <div class="search-input-group">
            <label>Search Pallet #</label>
            <input type="text" id="search_pallet" class="search-input" placeholder="e.g. P123">
        </div>
        <button class="btn-search" onclick="searchRecords()">FIND RECORDS</button>
        <div id="searchResults" class="results-dropdown"></div>
    </div>

    <h1>REC 7.2.12 WORKSPACE</h1>
    <div id="approvalBanner" class="banner"></div>

    <div class="mode-selector">
        <button id="modeReport" class="mode-btn active" onclick="setMode('Report')">Official Report (2 Cans)</button>
        <button id="modeQuick" class="mode-btn" onclick="setMode('Quick')">Quick Test Mode</button>
    </div>

    <div id="metaSection" class="meta-grid">
        <div class="form-group"><label>AG CODE</label><input type="text" id="ag_code" readonly></div>
        <div class="form-group"><label>Can Size</label><input type="text" id="can_size" readonly></div>
        <div class="form-group"><label>Pallet (Cans)</label><input type="text" id="pallet_cans" readonly></div>
        <div class="form-group"><label>Pallet (Lids)</label><input type="text" id="pallet_lids" readonly></div>
        <div class="form-group"><label>Dept</label><select id="dept"><option>Production</option><option>Quality</option></select></div>
        <div class="form-group"><label>Stage</label><select id="stage" onchange="renderTable()"><option>Start-up</option><option>During production</option><option>After production</option></select></div>
        <div class="form-group"><label>Micro #</label><input type="text" id="micro_serial"></div>
        <div class="form-group"><label>Verify <span class="spec-tag">(1.21±0.02)</span></label><input type="number" id="micro_check" step="0.01"></div>
    </div>

    <div id="aiDiagnosticPanel" class="ai-panel">
        <h3>⚠️ AI Seamer Diagnostics</h3>
        <ul id="aiList" style="font-size: 12px; color: #5d4037;"></ul>
    </div>

    <div class="table-container">
        <table id="inspectionTable">
            <thead>
                <tr id="canHeaderRow"></tr>
                <tr id="pointHeaderRow"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="footerMeta" style="margin-top:20px;">
        <label>Inspected By (Signature) *</label>
        <input type="text" id="inspector" style="width:100%;" placeholder="Enter name...">
    </div>

    <button id="submitBtn" class="btn-submit" onclick="submitFullEntry()">SYNC DATA TO CLOUD</button>
</div>

<script>
    const sb = supabase.createClient('https://kbpyivgmgipskwiutbtk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImticHlpdmdtZ2lwc2t3aXV0YnRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQ3ODYsImV4cCI6MjA5NDk0MDc4Nn0.kGcr57Mdnd9jFepz9ndDFuEUEwD8qRVqIkCNhmgCKPY');
    let currentMode = 'Report';
    const fields = [
        { id: 'vac', label: 'Vacuum (> -5)', isCalc: false },
        { id: 'bh', label: 'Body Hook (1.80-2.15)', isCalc: false },
        { id: 'ch', label: 'Cover Hook (1.70-2.10)', isCalc: false },
        { id: 'sl', label: 'Length (2.65-3.05)', isCalc: false },
        { id: 'st', label: 'Thickness (1.10-1.24)', isCalc: false },
        { id: 'ovp', label: 'Overlap % (Min 45%)', isCalc: true },
        { id: 'bhb', label: 'BHB % (70-90%)', isCalc: true },
        { id: 'fs', label: 'Free Space (0.03-0.19)', isCalc: true }
    ];

    async function searchRecords() {
        const ag = document.getElementById('search_ag').value;
        const pal = document.getElementById('search_pallet').value;
        const container = document.getElementById('searchResults');
        container.innerHTML = '';
        container.style.display = 'block';

        // Query Supabase for matching historical entries
        const { data } = await sb.from('double_seam_inspection_log')
            .select('ag_code, can_size, inspection_stage, pallet_cans, pallet_lids, id')
            .or(`ag_code.eq.${ag},pallet_cans.eq.${pal}`)
            .order('created_at', { ascending: false }).limit(10);

        if(data && data.length > 0) {
            data.forEach(r => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerText = `[${r.ag_code}] Pallet: ${r.pallet_cans} | Last Stage: ${r.inspection_stage}`;
                item.onclick = () => loadRecord(r);
                container.appendChild(item);
            });
        } else {
            container.innerHTML = '<div class="result-item">No active records found.</div>';
        }
    }

    function loadRecord(r) {
        document.getElementById('ag_code').value = r.ag_code;
        document.getElementById('can_size').value = r.can_size;
        document.getElementById('pallet_cans').value = r.pallet_cans;
        document.getElementById('pallet_lids').value = r.pallet_lids;
        document.getElementById('searchResults').style.display = 'none';
        renderTable();
        checkApproval();
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('metaSection').style.display = (m === 'Quick') ? 'none' : 'grid';
        document.getElementById('modeReport').classList.toggle('active', m === 'Report');
        document.getElementById('modeQuick').classList.toggle('active', m === 'Quick');
        renderTable();
    }

    function renderTable() {
        const canCount = (currentMode === 'Report') ? 2 : 1;
        const canHeader = document.getElementById('canHeaderRow');
        const pointHeader = document.getElementById('pointHeaderRow');
        const body = document.getElementById('tableBody');

        canHeader.innerHTML = '<th>Measurement</th>';
        pointHeader.innerHTML = '<th>Unit: mm/KPa</th>';
        for(let c=1; c<=canCount; c++) {
            canHeader.innerHTML += `<th colspan="3" class="can-header">CAN ${c}</th>`;
            for(let p=1; p<=3; p++) pointHeader.innerHTML += `<th>Pt ${p}</th>`;
        }

        body.innerHTML = '';
        fields.forEach(f => {
            if (currentMode === 'Quick' && f.id === 'vac') return;
            let row = `<tr class="${f.isCalc ? 'calc-row' : ''}"><td>${f.label}</td>`;
            for(let c=1; c<=canCount; c++) {
                for(let p=1; p<=3; p++) {
                    const inputId = `${f.id}_c${c}_p${p}`;
                    row += `<td><input type="number" step="0.01" class="table-input" id="${inputId}" 
                            ${f.isCalc ? 'readonly' : `oninput="runAI()"`}></td>`;
                }
            }
            body.innerHTML += row + '</tr>';
        });
    }

    function runAI() {
        const aiList = document.getElementById('aiList');
        const aiPanel = document.getElementById('aiDiagnosticPanel');
        let issues = [];
        const canCount = (currentMode === 'Report') ? 2 : 1;

        for(let c=1; c<=canCount; c++) {
            for(let p=1; p<=3; p++) {
                const bh = parseFloat(document.getElementById(`bh_c${c}_p${p}`).value) || 0;
                const ch = parseFloat(document.getElementById(`ch_c${c}_p${p}`).value) || 0;
                const sl = parseFloat(document.getElementById(`sl_c${c}_p${p}`).value) || 0;
                const st = parseFloat(document.getElementById(`st_c${c}_p${p}`).value) || 0;
                
                if(bh > 0 && ch > 0 && sl > 0) {
                    const te = 0.21, tb = 0.21;
                    const ov = (bh + ch + te) - sl;
                    const ovp = (ov / (sl - (2*te + tb))) * 100;
                    const bhb = ((bh - 1.1*tb) / (sl - 1.1*(2*te + tb))) * 100;
                    const fs = st - (2*tb + 3*te);

                    document.getElementById(`ovp_c${c}_p${p}`).value = Math.round(ovp);
                    document.getElementById(`bhb_c${c}_p${p}`).value = Math.round(bhb);
                    document.getElementById(`fs_c${c}_p${p}`).value = fs.toFixed(2);

                    if(ovp < 45 && ovp > 0) issues.push(`Can ${c}: Low Overlap - Check 1st operation roll tightness [4].`);
                }
            }
        }
        aiList.innerHTML = [...new Set(issues)].map(i => `<li>${i}</li>`).join('');
        aiPanel.style.display = issues.length > 0 ? 'block' : 'none';
    }

    async function checkApproval() {
        const code = document.getElementById('ag_code').value;
        const banner = document.getElementById('approvalBanner');
        if(code.length < 3) return;
        const { data } = await sb.from('startup_approval_dashboard').select('*').eq('ag_code', code).single();
        if(data && data.production_ready && data.quality_ready) {
            banner.innerText = "✅ APPROVED FOR CLOSING"; banner.className = "banner approved";
        } else {
            banner.innerText = "⏳ STARTUP PENDING (2+2 CANS)"; banner.className = "banner pending";
        }
    }

    async function submitFullEntry() {
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Syncing with Cloud...";
        const canCount = (currentMode === 'Report') ? 2 : 1;
        let batch = [];
        for(let c=1; c<=canCount; c++) {
            for(let p=1; p<=3; p++) {
                batch.push({
                    ag_code: document.getElementById('ag_code').value,
                    can_size: document.getElementById('can_size').value,
                    pallet_cans: document.getElementById('pallet_cans').value,
                    pallet_lids: document.getElementById('pallet_lids').value,
                    inspector_name: document.getElementById('inspector').value,
                    inspection_stage: document.getElementById('stage').value,
                    can_number: c, point_number: p,
                    body_hook: parseFloat(document.getElementById(`bh_c${c}_p${p}`).value),
                    overlap_percent: parseFloat(document.getElementById(`ovp_c${c}_p${p}`).value)
                });
            }
        }
        const { error } = await sb.from('double_seam_inspection_log').insert(batch);
        if(!error) alert("Records synced successfully!");
        btn.innerText = "SYNC DATA TO CLOUD";
        checkApproval();
    }

    window.onload = renderTable;
</script>
</body>
</html>
