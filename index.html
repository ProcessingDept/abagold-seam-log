<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Seam Inspection Log | REC 7.2.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #003366; --secondary-color: #3399ff; --bg-light: #f4f7fa; --success-color: #2e7d32; --danger-color: #c62828; --border-color: #d1d9e6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* 1. Enhanced Search Engine: AG, Job, and Pallet */
        .search-engine { background: var(--primary-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; color: white; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .search-input-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
        .search-input-group label { font-size: 10px; text-transform: uppercase; margin-bottom: 4px; color: #b0c4de; }
        .search-input { padding: 8px; border: none; border-radius: 4px; font-size: 13px; color: #333; }
        .btn-search { background: var(--secondary-color); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* 2. Metadata Grid: Added Job Number */
        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; background: #eef4f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: var(--primary-color); margin-bottom: 4px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: white; }

        /* 3. Red Warning Style for Out of Spec */
        .out-of-spec { color: var(--danger-color) !important; font-weight: bold; border: 1px solid var(--danger-color) !important; background-color: #fff0f0 !important; }

        /* 4. Table Layout */
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1150px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: var(--primary-color); color: white; text-transform: uppercase; }
        .calc-row { background: #f0f7ff; font-weight: bold; }
        input.table-input { width: 95%; border: 1px solid #eee; border-radius: 4px; background: white; text-align: center; font-size: 14px; padding: 4px 0; }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; font-weight: bold; border: 2px solid var(--secondary-color); border-radius: 8px; cursor: pointer; background: white; font-size: 13px; }
        .mode-btn.active { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

<div class="container">
    <!-- NEW TRIPLE SEARCH ENGINE -->
    <div class="search-engine" id="searchPanel">
        <div class="search-input-group"><label>Search AG Code</label><input type="text" id="s_ag" class="search-input"></div>
        <div class="search-input-group"><label>Search Job Number</label><input type="text" id="s_job" class="search-input"></div>
        <div class="search-input-group"><label>Search Pallet (Cans)</label><input type="text" id="s_pal" class="search-input"></div>
        <button class="btn-search" onclick="searchRecords()">FIND RUN</button>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" id="btnReport" onclick="setMode('Report')">REC 7.2.12 Completion</button>
        <button class="mode-btn" id="btnQuick" onclick="setMode('Quick')">Quick Test (Phone)</button>
    </div>

    <!-- METADATA GRID: Added Job Number and Removed Te/Tb Auto-Fill -->
    <div id="metaSection" class="meta-grid">
        <div class="form-group" id="agGroup"><label>AG CODE *</label><input type="text" id="ag_code"></div>
        <div class="form-group" id="jobGroup"><label>JOB NUMBER *</label><input type="text" id="job_no"></div>
        <div class="form-group"><label>Pallet (Cans)</label><input type="text" id="pallet_cans"></div>
        <div class="form-group"><label>Stage</label><select id="stage" onchange="renderView()"><option>Start-up</option><option>During production</option><option>After production</option></select></div>
        <div class="form-group"><label>Plate Te (Ends)</label><input type="number" id="te" step="0.01" oninput="runAI()"></div>
        <div class="form-group"><label>Plate Tb (Body)</label><input type="number" id="tb" step="0.01" oninput="runAI()"></div>
    </div>

    <div class="table-container">
        <table id="inspectionTable">
            <thead>
                <tr id="canHeaderRow"></tr>
                <tr id="pointHeaderRow"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div style="margin-top:20px;">
        <label>Inspector Signature *</label>
        <input type="text" id="inspector" style="width:100%;" placeholder="Enter name to sign off...">
    </div>

    <button class="btn-submit" style="background:var(--success-color); color:white; padding:15px; border:none; border-radius:6px; width:100%; font-weight:bold; cursor:pointer; margin-top:20px;" onclick="submitRecords()">SYNC DATA TO CLOUD</button>
</div>

<script>
    const sb = supabase.createClient('URL', 'KEY');
    let appMode = 'Report';

    const fields = [
        { id: 'bh', label: 'Body Hook (1.80-2.15)', isCalc: false, min: 1.80, max: 2.15 },
        { id: 'ch', label: 'Cover Hook (1.70-2.10)', isCalc: false, min: 1.70, max: 2.10 },
        { id: 'sl', label: 'Length (2.65-3.05)', isCalc: false, min: 2.65, max: 3.05 },
        { id: 'st', label: 'Thickness (1.10-1.24)', isCalc: false, min: 1.10, max: 1.24 },
        { id: 'ov_mm', label: 'Actual Overlap (1mm Min)', isCalc: true, min: 1.0, max: 5.0 },
        { id: 'ovp', label: 'Overlap % (Min 45%)', isCalc: true, min: 45, max: 100 },
        { id: 'bhb', label: 'B.H.B. % (70-90%)', isCalc: true, min: 70, max: 90 },
        { id: 'fs', label: 'Freespace (0.03-0.19)', isCalc: true, min: 0.03, max: 0.19 }
    ];

    function setMode(m) {
        appMode = m;
        document.getElementById('agGroup').style.display = (m === 'Quick') ? 'none' : 'flex';
        document.getElementById('jobGroup').style.display = (m === 'Quick') ? 'none' : 'flex';
        document.getElementById('btnReport').classList.toggle('active', m === 'Report');
        document.getElementById('btnQuick').classList.toggle('active', m === 'Quick');
        renderView();
    }

    function renderView() {
        const body = document.getElementById('tableBody');
        const canCount = (appMode === 'Report') ? 2 : 1;
        document.getElementById('canHeaderRow').innerHTML = `<th>Rows</th>${appMode === 'Report' ? '<th colspan="3">CAN 1</th><th colspan="3">CAN 2</th>' : '<th colspan="3">TEST CAN</th>'}`;
        document.getElementById('pointHeaderRow').innerHTML = `<th>Spec</th>${'<th>Pt 1</th><th>Pt 2</th><th>Pt 3</th>'.repeat(canCount)}`;
        
        body.innerHTML = '';
        fields.forEach(f => {
            let row = `<tr class="${f.isCalc ? 'calc-row' : ''}"><td>${f.label}</td>`;
            for(let c=1; c<=canCount; c++) {
                for(let p=1; p<=3; p++) {
                    row += `<td><input type="number" step="0.01" class="table-input" id="${f.id}_c${c}_p${p}" ${f.isCalc ? 'readonly' : 'oninput="runAI()"'}></td>`;
                }
            }
            body.innerHTML += row + '</tr>';
        });
    }

    function runAI() {
        const te = parseFloat(document.getElementById('te').value) || 0;
        const tb = parseFloat(document.getElementById('tb').value) || 0;
        const canCount = (appMode === 'Report') ? 2 : 1;

        for(let c=1; c<=canCount; c++) {
            for(let p=1; p<=3; p++) {
                const bh = parseFloat(document.getElementById(`bh_c${c}_p${p}`).value) || 0;
                const ch = parseFloat(document.getElementById(`ch_c${c}_p${p}`).value) || 0;
                const sl = parseFloat(document.getElementById(`sl_c${c}_p${p}`).value) || 0;
                const st = parseFloat(document.getElementById(`st_c${c}_p${p}`).value) || 0;

                if(bh && ch && sl && te > 0 && tb > 0) {
                    const ov_mm = (bh + ch + te) - sl;
                    const ovp = (ov_mm / (sl - (2*te + tb))) * 100;
                    const bhb = ((bh - (1.1 * tb)) / (sl - (1.1 * (2 * te + tb)))) * 100;
                    const fs = st - (2 * tb + 3 * te);

                    updateField(`ov_mm_c${c}_p${p}`, ov_mm.toFixed(2), 1.0, 5.0);
                    updateField(`ovp_c${c}_p${p}`, Math.round(ovp), 45, 100);
                    updateField(`bhb_c${c}_p${p}`, Math.round(bhb), 70, 90);
                    updateField(`fs_c${c}_p${p}`, fs.toFixed(2), 0.03, 0.19);
                }
            }
        }
    }

    function updateField(id, val, min, max) {
        const el = document.getElementById(id);
        el.value = val;
        el.classList.toggle('out-of-spec', val < min || val > max);
    }

    async function searchRecords() {
        const ag = document.getElementById('s_ag').value;
        const job = document.getElementById('s_job').value;
        const pal = document.getElementById('s_pal').value;
        alert(`Searching for AG: ${ag}, Job: ${job}, Pallet: ${pal}`);
    }

    window.onload = () => renderView();
</script>
</body>
</html>
