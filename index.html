<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double seam inspection log</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .banner { padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 12px; display: none; }
        .approved { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; display: block; }
        .pending { background: #fff3cd; color: #856404; display: block; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-top: 12px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .calc-grid { background: #f8f9fa; padding: 15px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; border: 1px solid #ddd; }
        .calc-val { font-weight: bold; color: #007bff; display: block; font-size: 1.2rem; }
        button#submitBtn { background: #28a745; color: white; padding: 16px; border: none; border-radius: 8px; width: 100%; font-weight: bold; font-size: 1.1rem; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div id="approvalBanner" class="banner"></div>

<div class="card">
    <label>AG CODE *</label>
    <input type="text" id="ag_code" placeholder="Enter AG Code..." oninput="lookupAndCheck()">
    <div id="autoPopInfo" style="font-size: 0.75rem; color: #28a745; margin-top: 4px; min-height: 1rem;"></div>
    
    <label>DEPARTMENT *</label>
    <select id="department">
        <option value="Production">Production</option>
        <option value="Quality">Quality</option>
    </select>
    
    <label>INSPECTION STAGE *</label>
    <select id="stage" onchange="checkApproval()">
        <option value="Start-up">Start-up</option>
        <option value="During production">During production</option>
    </select>

    <div style="display:flex; gap:10px;">
        <div style="flex:1;"><label>CAN NO.</label><select id="can_no"><option value="1">1</option><option value="2">2</option></select></div>
        <div style="flex:1;"><label>POINT (1-3)</label><select id="point_no"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
    </div>

    <label>BODY HOOK (mm)</label>
    <input type="number" id="bh" step="0.01" oninput="calculate()">

    <label>COVER HOOK (mm)</label>
    <input type="number" id="ch" step="0.01" oninput="calculate()">

    <label>SEAM LENGTH (mm)</label>
    <input type="number" id="sl" step="0.01" oninput="calculate()">

    <label>SEAM THICKNESS (mm)</label>
    <input type="number" id="st" step="0.01" oninput="calculate()">

    <div class="calc-grid">
        <div>Overlap %<span id="res_ovp" class="calc-val">0%</span></div>
        <div>B.H.B. %<span id="res_bhb" class="calc-val">0%</span></div>
    </div>

    <button id="submitBtn" onclick="submitEntry()">SUBMIT POINT RECORD</button>
</div>

<script>
    // SYNCHRONIZED CREDENTIALS
    const supabaseUrl = 'https://kbpyivgmgipskwiutbtk.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImticHlpdmdtZ2lwc2t3aXV0YnRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQ3ODYsImV4cCI6MjA5NDk0MDc4Nn0.kGcr57Mdnd9jFepz9ndDFuEUEwD8qRVqIkCNhmgCKPY';
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    async function lookupAndCheck() {
        const code = document.getElementById('ag_code').value;
        if(code.length < 3) return;
        const { data } = await sb.from('ag_code_master').select('*').eq('ag_code', code).single();
        if(data) document.getElementById('autoPopInfo').innerText = `Auto-Pop: Size ${data.can_size}`;
        checkApproval();
    }

    async function checkApproval() {
        const code = document.getElementById('ag_code').value;
        const banner = document.getElementById('approvalBanner');
        if(code.length < 3) return;
        const { data } = await sb.from('startup_approval_dashboard').select('*').eq('ag_code', code).single();
        if(data && data.production_ready && data.quality_ready) {
            banner.innerText = "✅ APPROVED FOR CLOSING";
            banner.className = "banner approved";
        } else {
            banner.innerText = "⏳ STARTUP PENDING (2+2 CANS)";
            banner.className = "banner pending";
        }
    }

    function calculate() {
        const bh = parseFloat(document.getElementById('bh').value) || 0,
              ch = parseFloat(document.getElementById('ch').value) || 0,
              sl = parseFloat(document.getElementById('sl').value) || 0,
              st = parseFloat(document.getElementById('st').value) || 0;
        const te = 0.21, tb = 0.21;
        const ov = (bh + ch + te) - sl;
        const ovp = (ov / (sl - (2*te + tb))) * 100;
        const bhb = ((bh - 1.1*tb) / (sl - 1.1*(2*te + tb))) * 100;
        document.getElementById('res_ovp').innerText = Math.round(ovp) + "%";
        document.getElementById('res_bhb').innerText = Math.round(bhb) + "%";
        return { ov, ovp, bhb };
    }

    async function submitEntry() {
        const c = calculate();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Saving...";
        const entry = {
            ag_code: document.getElementById('ag_code').value,
            department: document.getElementById('department').value,
            inspection_stage: document.getElementById('stage').value,
            can_number: parseInt(document.getElementById('can_no').value),
            point_number: parseInt(document.getElementById('point_no').value),
            body_hook: parseFloat(document.getElementById('bh').value),
            cover_hook: parseFloat(document.getElementById('ch').value),
            seam_length: parseFloat(document.getElementById('sl').value),
            seam_thickness: parseFloat(document.getElementById('st').value),
            overlap_percent: c.ovp, bhb_percent: c.bhb
        };
        const { error } = await sb.from('double_seam_inspection_log').insert([entry]);
        if(!error) { alert("Saved!"); checkApproval(); } else { alert("Error: " + error.message); }
        btn.innerText = "SUBMIT POINT RECORD";
    }
</script>
</body>
</html>
