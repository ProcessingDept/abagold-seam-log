<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Seam Inspection Log | REC 7.2.12</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #003366; --secondary-color: #3399ff; --bg-light: #f4f7fa; --success-color: #2e7d32; --danger-color: #c62828; --border-color: #d1d9e6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .search-engine { background: var(--primary-color); padding: 12px; border-radius: 8px; margin-bottom: 15px; color: white; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .search-input-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
        .search-input-group label { font-size: 10px; text-transform: uppercase; margin-bottom: 4px; color: #b0c4de; }
        .search-input { padding: 8px; border: none; border-radius: 4px; font-size: 13px; }
        .btn-search { background: var(--secondary-color); color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; font-weight: bold; border: 2px solid var(--secondary-color); border-radius: 8px; cursor: pointer; background: white; font-size: 13px; transition: 0.3s; }
        .mode-btn.active { background: var(--primary-color); color: white; }

        .pt-selector { display: none; gap: 5px; margin-bottom: 15px; }
        .pt-btn { flex: 1; padding: 10px; font-size: 12px; font-weight: bold; border: 1px solid var(--secondary-color); border-radius: 4px; background: white; cursor: pointer; }
        .pt-btn.active { background: var(--secondary-color); color: white; }

        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; background: #eef4f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: var(--primary-color); margin-bottom: 4px; text-transform: uppercase; }
        .spec-tag { color: var(--secondary-color); font-weight: normal; font-size: 10px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }

        .ai-panel { background: #fff3e0; border: 1px solid #ffe0b2; border-radius: 8px; padding: 15px; margin: 15px 0; display: none; }
        .ai-panel h3 { margin: 0 0 10px 0; color: #e65100; font-size: 14px; }

        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1000px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: var(--primary-color); color: white; text-transform: uppercase; }
        .calc-row { background: #f0f7ff; font-weight: bold; }
        input.table-input { width: 95%; border: none; background: transparent; text-align: center; font-size: 14px; }

        .single-column-view { display: none; background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .single-column-view .form-group { margin-bottom: 12px; }

        .btn-submit { background: var(--success-color); color: white; padding: 15px; border: none; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-engine" id="searchPanel">
        <div class="search-input-group"><label>AG Code Search</label><input type="text" id="search_ag" class="search-input"></div>
        <div class="search-input-group"><label>Pallet # Search</label><input type="text" id="search_pallet" class="search-input"></div>
        <button class="btn-search" onclick="searchRecords()">FIND RUN</button>
    </div>

    <div class="mode-selector">
        <button id="modeReport" class="mode-btn active" onclick="setMode('Report')">REC 7.2.12 Completion (Tablet)</button>
        <button id="modeQuick" class="mode-btn" onclick="setMode('Quick')">Quick Test (Phone)</button>
    </div>

    <!-- Metadata: Shown in Tablet Mode -->
    <div id="metaSection" class="meta-grid">
        <div class="form-group"><label>AG CODE</label><input type="text" id="ag_code" readonly></div>
        <div class="form-group"><label>Plate Te (Ends)</label><input type="number" id="te" step="0.01"></div>
        <div class="form-group"><label>Plate Tb (Body)</label><input type="number" id="tb" step="0.01"></div>
        <div class="form-group"><label>Can Size</label><input type="text" id="can_size" readonly></div>
    </div>

    <!-- Phone Tab Selector (Quick Mode) -->
    <div id="ptSelector" class="pt-selector">
        <button class="pt-btn active" onclick="setQuickPt(1)">Pt 1</button>
        <button class="pt-btn" onclick="setQuickPt(2)">Pt 2</button>
        <button class="pt-btn" onclick="setQuickPt(3)">Pt 3</button>
    </div>

    <div id="aiDiagnosticPanel" class="ai-panel">
        <h3>⚠️ AI Seamer Diagnostics</h3>
        <ul id="aiList" style="font-size: 12px; color: #5d4037;"></ul>
    </div>

    <!-- Tablet View: Matrix -->
    <div id="matrixContainer" class="table-container">
        <table id="inspectionTable">
            <thead><tr id="canHeaderRow"></tr><tr id="pointHeaderRow"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <!-- Phone View: Single Column -->
    <div id="phoneView" class="single-column-view">
        <div class="form-group"><label>AG CODE</label><input type="text" id="quick_ag"></div>
        <!-- Calculation inputs added to Quick Mode -->
        <div class="meta-grid" style="grid-template-columns: 1fr 1fr; background: none; padding: 0; border: none;">
            <div class="form-group"><label>Plate Te</label><input type="number" id="te_q" step="0.01" oninput="runAI()"></div>
            <div class="form-group"><label>Plate Tb</label><input type="number" id="tb_q" step="0.01" oninput="runAI()"></div>
        </div>
        <hr style="border: 0.5px solid #eee; margin: 15px 0;">
        <div id="quickFormContent"></div>
    </div>

    <div id="footerMeta" style="margin-top:20px;">
        <label>Inspector Signature *</label>
        <input type="text" id="inspector" style="width:100%;" placeholder="Enter name...">
    </div>

    <button id="submitBtn" class="btn-submit" onclick="submitRecords()">SYNC TO DATABASE</button>
</div>

<script>
    const sb = supabase.createClient('https://kbpyivgmgipskwiutbtk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImticHlpdmdtZ2lwc2t3aXV0YnRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQ3ODYsImV4cCI6MjA5NDk0MDc4Nn0.kGcr57Mdnd9jFepz9ndDFuEUEwD8qRVqIkCNhmgCKPY');
    let appMode = 'Report';
    let currentPt = 1;
    let quickData = { pt1: {}, pt2: {}, pt3: {} };

    const fields = [
        { id: 'bh', label: 'Body Hook (1.80-2.15)', isCalc: false },
        { id: 'ch', label: 'Cover Hook (1.70-2.10)', isCalc: false },
        { id: 'sl', label: 'Length (2.65-3.05)', isCalc: false },
        { id: 'st', label: 'Thickness (1.10-1.24)', isCalc: false },
        { id: 'ov_mm', label: 'Actual Overlap (1mm Min)', isCalc: true },
        { id: 'ovp', label: 'Overlap % (Min 45%)', isCalc: true }
    ];

    function setMode(m) {
        appMode = m;
        document.getElementById('metaSection').style.display = (m === 'Quick') ? 'none' : 'grid';
        document.getElementById('searchPanel').style.display = (m === 'Quick') ? 'none' : 'flex';
        document.getElementById('ptSelector').style.display = (m === 'Quick') ? 'flex' : 'none';
        document.getElementById('matrixContainer').style.display = (m === 'Quick') ? 'none' : 'block';
        document.getElementById('phoneView').style.display = (m === 'Quick') ? 'block' : 'none';
        
        document.getElementById('modeReport').classList.toggle('active', m === 'Report');
        document.getElementById('modeQuick').classList.toggle('active', m === 'Quick');
        renderView();
    }

    function setQuickPt(pt) {
        currentPt = pt;
        document.querySelectorAll('.pt-btn').forEach((b, i) => b.classList.toggle('active', i === pt-1));
        renderView();
    }

    function renderView() {
        if (appMode === 'Report') {
            const body = document.getElementById('tableBody');
            document.getElementById('canHeaderRow').innerHTML = '<th>Measurement</th><th colspan="3">CAN 1</th><th colspan="3">CAN 2</th>';
            document.getElementById('pointHeaderRow').innerHTML = '<th>Targets</th><th>Pt 1</th><th>Pt 2</th><th>Pt 3</th><th>Pt 1</th><th>Pt 2</th><th>Pt 3</th>';
            body.innerHTML = '';
            fields.forEach(f => {
                let row = `<tr class="${f.isCalc ? 'calc-row' : ''}"><td>${f.label}</td>`;
                for(let c=1; c<=2; c++) {
                    for(let p=1; p<=3; p++) {
                        row += `<td><input type="number" step="0.01" class="table-input" id="${f.id}_c${c}_p${p}" ${f.isCalc ? 'readonly' : 'oninput="runAI()"'}></td>`;
                    }
                }
                body.innerHTML += row + '</tr>';
            });
        } else {
            const content = document.getElementById('quickFormContent');
            content.innerHTML = '';
            fields.forEach(f => {
                const val = quickData[`pt${currentPt}`][f.id] || '';
                content.innerHTML += `<div class="form-group">
                    <label>${f.label}</label>
                    <input type="number" step="0.01" id="${f.id}_q" value="${val}" ${f.isCalc ? 'readonly style="background:#f0f7ff;"' : `oninput="saveQuickVal('${f.id}')"`}>
                </div>`;
            });
        }
    }

    function saveQuickVal(id) {
        quickData[`pt${currentPt}`][id] = document.getElementById(`${id}_q`).value;
        runAI();
    }

    function runAI() {
        const te = parseFloat(document.getElementById(appMode === 'Quick' ? 'te_q' : 'te').value) || 0;
        const tb = parseFloat(document.getElementById(appMode === 'Quick' ? 'tb_q' : 'tb').value) || 0;
        let issues = [];

        if (appMode === 'Quick') {
            const d = quickData[`pt${currentPt}`];
            if(d.bh && d.ch && d.sl && te > 0) {
                const ov = (parseFloat(d.bh) + parseFloat(d.ch) + te) - parseFloat(d.sl);
                document.getElementById('ov_mm_q').value = ov.toFixed(2);
                document.getElementById('ovp_q').value = Math.round((ov / (parseFloat(d.sl) - (2*te + tb))) * 100);
                if(ov < 1.0) issues.push(`Actual Overlap < 1.0mm - Check roll pressure.`);
            }
        } else {
            // Matrix calculation logic...
        }
        document.getElementById('aiList').innerHTML = [...new Set(issues)].map(i => `<li>${i}</li>`).join('');
        document.getElementById('aiDiagnosticPanel').style.display = issues.length > 0 ? 'block' : 'none';
    }

    async function searchRecords() {
        const ag = document.getElementById('search_ag').value;
        const { data } = await sb.from('double_seam_inspection_log').select('*').eq('ag_code', ag).limit(1);
        if(data && data) {
            document.getElementById('ag_code').value = data.ag_code;
            document.getElementById('quick_ag').value = data.ag_code;
            document.getElementById('can_size').value = data.can_size;
            renderView();
        }
    }

    async function submitRecords() {
        alert("Batch Syncing to Database...");
    }

    window.onload = () => setMode('Report');
</script>
</body>
</html>
